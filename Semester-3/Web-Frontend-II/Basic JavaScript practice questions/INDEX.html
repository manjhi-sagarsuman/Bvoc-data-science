<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    
<input id="a">
<input id="b">
<button onclick="cal()">Add</button>

<script>
    function add(x, y) {
        return x + y;
    }

    function cal() {
        let n1 = document.getElementById("a").value;
        let n2 = document.getElementById("b").value;
        let sum = add(Number(n1), Number(n2));
        alert(sum);
    }
</script>


</body>
</html>
