<!DOCTYPE html>
<html>
<head>
    <title>Change Text</title>
</head>
<body>

    <h1 id="msg">Hello Student</h1>

    <button onclick="changeText()">Change Text</button>

    <script>
        function changeText() {
            document.getElementById("msg").innerHTML = "Learning JavaScript";
        }
    </script>

</body>
</html>
