<!DOCTYPE html>
<html>
<head>
    <title>Multiplication</title>
</head>
<body>

    <button onclick="multiply()">Multiply</button>

    <script>
    function multiply(){
    let a = Number(prompt("Enter first number:"));
    let b = Number(prompt("Enter second number:"));

    alert("Multiplication = " + (a*b));
    }
    </script>

</body>
</html>
